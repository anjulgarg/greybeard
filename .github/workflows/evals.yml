name: evals

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Tier 0 is deterministic and gates this job. Tiers 1 and 2 are LLM-backed
      # and skip automatically (no GREYBEARD_EVAL_PROVIDER), so CI needs no model
      # judge and no network access.
      - name: Run Greybeard eval harness
        run: python evals/runner/run.py
